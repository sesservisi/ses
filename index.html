<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRT Ses Servisi - Akıllı Planlama ve Analiz Paneli</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark .custom-scroll::-webkit-scrollbar-track { background: #1e293b; }
        .dark .custom-scroll::-webkit-scrollbar-thumb { background: #475569; }
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 font-sans text-slate-800 dark:text-slate-100 antialiased min-h-screen flex flex-col transition-colors duration-200 selection:bg-indigo-500 selection:text-white">

    <header class="bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700/80 sticky top-0 z-50 transition-colors backdrop-blur-md bg-white/95 dark:bg-slate-800/95">
        <div class="max-w-[1600px] mx-auto px-4 sm:px-6 py-3.5 flex flex-col sm:flex-row justify-between items-center gap-4">
            
            <div class="flex items-center gap-3 w-full sm:w-auto justify-center sm:justify-start">
                <div class="bg-gradient-to-tr from-indigo-600 to-violet-500 p-2.5 rounded-xl text-white shadow-md shadow-indigo-200 dark:shadow-none">
                    <i class="fa-solid fa-wave-square text-lg animate-pulse"></i>
                </div>
                <div class="text-center sm:text-left">
                    <h1 class="text-base font-black tracking-wider text-slate-900 dark:text-white flex items-center gap-2 justify-center sm:justify-start">
                        TRT SES SERVİSİ 
                        <span class="text-[10px] font-bold bg-indigo-50 dark:bg-indigo-950 text-indigo-600 dark:text-indigo-400 px-2 py-0.5 rounded-md border border-indigo-100 dark:border-indigo-900/50">v2.5 PRO</span>
                    </h1>
                    <p class="text-[11px] font-semibold text-slate-400 dark:text-slate-400 tracking-tight">Akıllı Çalışma Planı & Gelişmiş Analiz Paneli</p>
                </div>
            </div>

            <div class="flex items-center gap-3 w-full sm:w-auto justify-center sm:justify-end flex-wrap sm:flex-nowrap">
                
                <button onclick="exportSesBackup()" class="flex items-center gap-1.5 px-3 py-2 text-xs font-bold bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl transition-all shadow-sm cursor-pointer">
                    <i class="fa-solid fa-download"></i> Verileri Yedekle
                </button>
                <label for="import-ses-file" class="flex items-center gap-1.5 px-3 py-2 text-xs font-bold bg-amber-600 hover:bg-amber-700 text-white rounded-xl transition-all shadow-sm cursor-pointer">
                    <i class="fa-solid fa-upload"></i> Yedeği Geri Yükle
                    <input type="file" id="import-ses-file" accept=".json" class="hidden" onchange="importSesBackup(event)">
                </label>

                <div id="badge-session-status" class="hidden items-center gap-1.5 px-3 py-2 text-xs font-bold bg-emerald-50 dark:bg-emerald-950/40 text-emerald-600 dark:text-emerald-400 rounded-xl border border-emerald-100 dark:border-emerald-900/30">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                    </span>
                    Aktif Oturum
                </div>

                <button onclick="toggleDarkMode()" class="p-2.5 rounded-xl bg-slate-100 hover:bg-slate-200 dark:bg-slate-700/50 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-300 transition-all border border-slate-200/40 dark:border-slate-600/30 cursor-pointer" title="Tema Değiştir">
                    <i id="theme-icon" class="fa-solid fa-moon text-sm"></i>
                </button>
            </div>
        </div>
    </header>

    <script>
        // Sitenin mevcut LocalStorage verilerini kayıpsız toplayıp .json dosyası olarak indiren fonksiyon
        function exportSesBackup() {
            const keysToBackup = [
                'ses_stored_matrix',
                'ses_staff_leaves_pool',
                'ses_cumulative_shifts_pool',
                'ses_cumulative_days_list',
                'ses_stored_timestamp',
                'ses_admin_session_live'
            ];
            
            let backupData = {};
            keysToBackup.forEach(key => {
                backupData[key] = localStorage.getItem(key);
            });
            
            if (!backupData['ses_stored_matrix']) {
                alert("Yedeklenecek herhangi bir veri bulunamadı! Önce bir Excel planı yüklemelisiniz.");
                return;
            }

            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(backupData));
            const dlAnchorElem = document.createElement('a');
            dlAnchorElem.setAttribute("href", dataStr);
            dlAnchorElem.setAttribute("download", "trt_ses_servisi_tam_yedek.json");
            document.body.appendChild(dlAnchorElem);
            dlAnchorElem.click();
            dlAnchorElem.remove();
        }

        // İndirilen .json yedek dosyasını telefonda ya da başka tarayıcıda seçince otomatik yükleyen fonksiyon
        function importSesBackup(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const parsedData = JSON.parse(e.target.result);
                    
                    // Temel iş matrisi kontrolü yapalım ki yanlış dosya yüklenmesin
                    if (parsedData.hasOwnProperty('ses_stored_matrix') && parsedData['ses_stored_matrix'] !== null) {
                        
                        // Tüm havuzları tek tek tarayıcı hafızasına yerleştir
                        Object.keys(parsedData).forEach(key => {
                            if (parsedData[key] !== null) {
                                localStorage.setItem(key, parsedData[key]);
                            }
                        });
                        
                        alert("Harika! İş logları, İzin havuzları, Ekip listeleri ve tüm site verileriniz başarıyla geri yüklendi.");
                        window.location.reload(); // Sayfayı yenileyerek verileri ekrana bas
                    } else {
                        alert("Hatalı yedek dosyası formatı! Lütfen geçerli bir TRT Ses Servisi yedek dosyası seçin.");
                    }
                } catch (err) {
                    alert("Yedek dosyası okunurken teknik bir hata oluştu.");
                    console.error(err);
                }
            };
            reader.readAsText(file);
        }
    </script>

    </body>
</html>
