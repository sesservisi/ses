<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personel İş Takip Sistemi</title>
    <!-- Tailwind CSS v4 CDN -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <!-- Google Fonts & Material Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        /* Özel kaydırma çubuğu */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">

    <!-- Üst Bar / Header -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-40 shadow-xs">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3 cursor-pointer" onclick="app.init()">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-md shadow-blue-200">
                    <span class="material-icons">assignment</span>
                </div>
                <div>
                    <h1 class="font-bold text-lg tracking-tight text-slate-900">İş Takip Paneli</h1>
                    <p class="text-xs text-slate-500 font-medium">Görev ve Planlama Yönetimi</p>
                </div>
            </div>
            
            <div id="header-actions" class="flex items-center space-x-3">
                <!-- Dinamik butonlar buraya gelecek -->
            </div>
        </div>
    </header>

    <!-- Ana İçerik Alanı -->
    <main class="flex-1 max-w-7xl w-full mx-auto p-4 md:p-6">
        <div id="app-container" class="space-y-6">
            <!-- Yükleniyor Ekranı (Varsayılan) -->
            <div class="flex flex-col items-center justify-center py-20 space-y-4">
                <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                <p class="text-slate-500 font-medium text-sm">Veriler yükleniyor, lütfen bekleyin...</p>
            </div>
        </div>
    </main>

    <!-- Alt Bar / Footer -->
    <footer class="bg-white border-t border-slate-200 py-4 mt-auto">
        <div class="max-w-7xl mx-auto px-4 text-center text-xs text-slate-400 font-medium">
            &copy; 2026 İş Takip Paneli Sistemi. Tüm Hakları Saklıdır.
        </div>
    </footer>

    <!-- Uygulama Mantığı (JavaScript) -->
    <script>
        // Mock Veri Seti (Gerçek senaryoda API'den çekilecek)
        const mockData = {
            personeller: [
                { id: 1, ad: "Ahmet Yılmaz", gorev: "Kıdemli Geliştirici", avatar: "AY" },
                { id: 2, ad: "Mehmet Demir", gorev: "Arayüz Tasarımcısı", avatar: "MD" },
                { id: 3, ad: "Ayşe Kaya", gorev: "Proje Yöneticisi", avatar: "AK" },
                { id: 4, ad: "Can Özkan", gorev: "Sistem Yöneticisi", avatar: "CÖ" }
            ],
            isGunleri: [
                { id: "g1", tarih: "15.06.2026", gun: "Pazartesi", toplamIs: 4 },
                { id: "g2", tarih: "16.06.2026", gun: "Salı", toplamIs: 3 },
                { id: "g3", tarih: "17.06.2026", gun: "Çarşamba", toplamIs: 5 },
                { id: "g4", tarih: "18.06.2026", gun: "Perşembe", toplamIs: 2 },
                { id: "g5", tarih: "19.06.2026", gun: "Cuma", toplamIs: 6 }
            ],
            isler: [
                { id: 101, personelId: 1, gunId: "g1", baslik: "API Entegrasyonu", durum: "Tamamlandı", sure: "4 Saat", aciklama: "Kullanıcı doğrulama servislerinin backend entegrasyonu tamamlanacak ve test senaryoları koşulacak." },
                { id: 102, personelId: 1, gunId: "g1", baslik: "Veritabanı Optimizasyonu", durum: "Devam Ediyor", sure: "3 Saat", aciklama: "Yavaş çalışan SQL sorguları tespit edilerek indeksleme çalışmaları yapılacak." },
                { id: 103, personelId: 2, gunId: "g1", baslik: "Dashboard Arayüz Çizimi", durum: "Tamamlandı", sure: "5 Saat", aciklama: "Müşteri paneli için hazırlanan figma tasarımlarının son revizyonları uygulanacak." },
                { id: 104, personelId: 3, gunId: "g2", baslik: "Müşteri Toplantısı", durum: "Beklemede", sure: "2 Saat", aciklama: "Yeni faz gereksinimleri için proje detayları masaya yatırılacak." },
                { id: 105, personelId: 1, gunId: "g3", baslik: "Bug Fix Seansı", durum: "Devam Ediyor", sure: "6 Saat", aciklama: "Sürüm öncesi raporlama ekranında patlayan filtreleme hataları giderilecek." }
            ]
        };

        class IsTakipApp {
            constructor() {
                this.state = {
                    currentView: 'home', // 'home' veya 'personel-detay'
                    selectedPersonel: null
                };
            }

            init() {
                this.state.currentView = 'home';
                this.state.selectedPersonel = null;
                this.renderHeaderActions();
                this.renderHome();
            }

            renderHeaderActions() {
                const container = document.getElementById('header-actions');
                if (this.state.currentView === 'home') {
                    container.innerHTML = `
                        <div class="text-sm font-semibold text-slate-600 bg-slate-100 px-3 py-1.5 rounded-lg flex items-center space-x-1">
                            <span class="material-icons text-sm">calendar_month</span>
                            <span>Haziran 2026</span>
                        </div>
                    `;
                } else {
                    container.innerHTML = `
                        <button onclick="app.init()" class="flex items-center space-x-1 text-sm font-semibold bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 py-2 rounded-xl transition cursor-pointer">
                            <span class="material-icons text-sm">arrow_back</span>
                            <span>Ana Sayfaya Dön</span>
                        </button>
                    `;
                }
            }

            renderHome() {
                const container = document.getElementById('app-container');
                
                let html = `
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <!-- Sol Sütun: Personel Seçimi -->
                        <div class="lg:col-span-1 space-y-4">
                            <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-xs">
                                <h3 class="font-bold text-slate-900 text-base mb-1 flex items-center space-x-2">
                                    <span class="material-icons text-blue-600 text-md">people</span>
                                    <span>Personel Kadrosu</span>
                                </h3>
                                <p class="text-xs text-slate-500 mb-4">İş listesini görmek için bir personel seçin</p>
                                <div class="space-y-2">
                `;

                mockData.personeller.forEach(p => {
                    html += `
                        <div onclick="app.selectPersonel(${p.id})" class="flex items-center justify-between p-3 rounded-xl border border-slate-100 bg-slate-50/50 hover:bg-blue-50/50 hover:border-blue-200 transition cursor-pointer group">
                            <div class="flex items-center space-x-3">
                                <div class="w-10 h-10 bg-slate-200 group-hover:bg-blue-600 group-hover:text-white rounded-lg flex items-center justify-center font-bold text-sm text-slate-700 transition">
                                    ${p.avatar}
                                </div>
                                <div>
                                    <h4 class="font-semibold text-sm text-slate-900 group-hover:text-blue-700 transition">${p.ad}</h4>
                                    <p class="text-xs text-slate-500">${p.gorev}</p>
                                </div>
                            </div>
                            <span class="material-icons text-slate-400 group-hover:text-blue-500 transition text-sm">chevron_right</span>
                        </div>
                    `;
                });

                html += `
                                </div>
                            </div>
                        </div>

                        <!-- Sağ Sütun: İş Günleri Listesi -->
                        <div class="lg:col-span-2">
                            <div class="bg-white rounded-2xl border border-slate-200 shadow-xs overflow-hidden">
                                <div class="p-4 border-b border-slate-200 bg-slate-50/50">
                                    <h3 class="font-bold text-slate-900 text-base flex items-center space-x-2">
                                        <span class="material-icons text-blue-600 text-md">view_timeline</span>
                                        <span>Çalışma Günleri ve Yoğunluk</span>
                                    </h3>
                                </div>
                                <div class="divide-y-2 divide-slate-300">
                `;

                // Buradaki 'divide-y-2 divide-slate-300' sınıfı gün çizgilerini belirginleştirdi
                mockData.isGunleri.forEach(g => {
                    html += `
                        <div class="p-4 hover:bg-slate-50/40 transition flex items-center justify-between">
                            <div class="flex items-center space-x-4">
                                <div class="w-12 h-12 bg-slate-100 rounded-xl flex flex-col items-center justify-center border border-slate-200">
                                    <span class="text-xs font-bold text-slate-700">${g.tarih.split('.')[0]}</span>
                                    <span class="text-[10px] uppercase font-semibold text-slate-400">${g.gun.substring(0,3)}</span>
                                </div>
                                <div>
                                    <h4 class="font-semibold text-sm text-slate-900">${g.tarih} - ${g.gun}</h4>
                                    <p class="text-xs text-slate-500">Planlanan Toplam Görev Sayısı</p>
                                </div>
                            </div>
                            <div class="flex items-center space-x-2">
                                <span class="px-2.5 py-1 bg-blue-50 text-blue-700 text-xs font-bold rounded-lg border border-blue-100">
                                    ${g.toplamIs} Görev
                                </span>
                            </div>
                        </div>
                    `;
                });

                html += `
                                </div>
                            </div>
                        </div>
                    </div>
                `;

                container.innerHTML = html;
            }

            selectPersonel(id) {
                const personel = mockData.personeller.find(p => p.id === id);
                if (!personel) return;

                this.state.currentView = 'personel-detay';
                this.state.selectedPersonel = personel;
                
                this.renderHeaderActions();
                this.renderPersonelTasks();
            }

            renderPersonelTasks() {
                const container = document.getElementById('app-container');
                const p = this.state.selectedPersonel;

                // Seçilen personele ait işleri filtrele
                const personelIsleri = mockData.isler.filter(i => i.personelId === p.id);

                let html = `
                    <div class="space-y-6">
                        <!-- Profil Kartı -->
                        <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-xs flex flex-col sm:flex-row items-center justify-between gap-4">
                            <div class="flex items-center space-x-4 text-center sm:text-left flex-col sm:flex-row">
                                <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center text-white font-bold text-xl shadow-lg shadow-blue-100 mb-3 sm:mb-0">
                                    ${p.avatar}
                                </div>
                                <div>
                                    <h2 class="font-bold text-xl text-slate-900">${p.ad}</h2>
                                    <p class="text-sm text-slate-500 font-medium">${p.gorev}</p>
                                </div>
                            </div>
                            <div class="flex items-center space-x-6 text-center">
                                <div class="px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl">
                                    <div class="text-xl font-bold text-slate-900">${personelIsleri.length}</div>
                                    <div class="text-[11px] font-semibold text-slate-400 uppercase">Toplam İş</div>
                                </div>
                                <div class="px-4 py-2 bg-green-50 border border-green-100 rounded-xl">
                                    <div class="text-xl font-bold text-green-700">${personelIsleri.filter(i => i.durum === 'Tamamlandı').length}</div>
                                    <div class="text-[11px] font-semibold text-green-500 uppercase">Biten</div>
                                </div>
                            </div>
                        </div>

                        <!-- İş Listesi Başlığı -->
                        <div class="bg-white rounded-2xl border border-slate-200 shadow-xs overflow-hidden">
                            <div class="p-4 border-b border-slate-200 bg-slate-50/50">
                                <h3 class="font-bold text-slate-900 text-base flex items-center space-x-2">
                                    <span class="material-icons text-blue-600 text-md">assignment_ind</span>
                                    <span>Personele Atanmış Görevler</span>
                                </h3>
                            </div>
                            <div class="divide-y divide-slate-100">
                `;

                if (personelIsleri.length === 0) {
                    html += `
                        <div class="p-8 text-center text-slate-400">
                            <span class="material-icons text-4xl block mb-2">layers_clear</span>
                            <p class="text-sm font-medium">Bu personele ait tanımlanmış bir iş bulunamadı.</p>
                        </div>
                    `;
                } else {
                    personelIsleri.forEach(is => {
                        const gun = mockData.isGunleri.find(g => g.id === is.gunId);
                        
                        // Durum renk belirteçleri
                        let durumClass = "bg-slate-100 text-slate-700 border-slate-200";
                        if (is.durum === 'Tamamlandı') durumClass = "bg-green-50 text-green-700 border-green-200";
                        if (is.durum === 'Devam Ediyor') durumClass = "bg-amber-50 text-amber-700 border-amber-200";

                        html += `
                            <div class="p-5 hover:bg-slate-50/30 transition space-y-3">
                                <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-2">
                                    <div class="space-y-1">
                                        <div class="flex items-center space-x-2">
                                            <span class="text-xs font-semibold text-slate-400 bg-slate-100 px-2 py-0.5 rounded-md">
                                                ${gun ? gun.tarih : ''}
                                            </span>
                                            <h4 class="font-bold text-base text-slate-900">${is.baslik}</h4>
                                        </div>
                                    </div>
                                    <div class="flex items-center space-x-2 self-start sm:self-center">
                                        <span class="text-xs font-medium text-slate-500 bg-slate-100 px-2.5 py-1 rounded-lg border border-slate-200 flex items-center space-x-1">
                                            <span class="material-icons text-xs">schedule</span>
                                            <span>${is.sure}</span>
                                        </span>
                                        <span class="text-xs font-bold px-2.5 py-1 rounded-lg border ${durumClass}">
                                            ${is.durum}
                                        </span>
                                    </div>
                                </div>
                                
                                <!-- Açıklama Alanı (İstediğiniz gibi turuncu çizgi ve gri arka plan kaldırıldı, şeffaf hale getirildi) -->
                                <div class="text-sm text-slate-600 leading-relaxed pt-1">
                                    ${is.aciklama}
                                </div>
                            </div>
                        `;
                    });
                }

                html += `
                            </div>
                        </div>
                    </div>
                `;

                container.innerHTML = html;
            }
        }

        // Uygulamayı Başlat
        const app = new IsTakipApp();
        document.addEventListener('DOMContentLoaded', () => {
            // Yapay yüklenme gecikmesi (0.5 sn)
            setTimeout(() => {
                app.init();
            }, 500);
        });
    </script>
</body>
</html>
