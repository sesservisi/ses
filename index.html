<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content=\"width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no\">
    <title>Ses Servisi Çalışma Planı & Analiz Paneli</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #f97316; border-radius: 4px; }
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 antialiased min-h-screen flex flex-col">

    <header class="bg-gradient-to-r align-middle from-indigo-900 via-slate-900 to-indigo-950 text-white shadow-xl border-b border-indigo-500/20">
        <div class="max-w-7xl mx-auto px-4 py-5 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3.5">
                <div class="bg-gradient-to-br from-orange-500 to-amber-600 p-2.5 rounded-xl shadow-md shadow-orange-500/20 animate-pulse">
                    <i class="fa-solid fa-wave-square text-xl text-white"></i>
                </div>
                <div>
                    <h1 class="text-xl font-black tracking-wide bg-gradient-to-r from-white via-slate-100 to-orange-200 bg-clip-text text-transparent">SES SERVİSİ ÇALIŞMA PLANI</h1>
                    <p class="text-xs text-indigo-200/70 font-medium mt-0.5 flex items-center gap-1">
                        <i class="fa-solid fa-circle-check text-emerald-400 text-[10px]"></i> Canlı Merkezi Veri Senkronizasyonu
                    </p>
                </div>
            </div>
            
            <nav class="flex bg-slate-800/60 p-1 rounded-xl border border-slate-700/50 backdrop-blur-sm">
                <button id="tab-dashboard" onclick="switchTab('dashboard')" class="px-5 py-2 rounded-lg text-sm font-bold transition-all duration-300 flex items-center gap-2 bg-gradient-to-r from-orange-500 to-amber-500 text-white shadow-md">
                    <i class="fa-solid fa-calendar-week"></i> Haftalık Plan
                </button>
                <button id="tab-analytics" onclick="switchTab('analytics')" class="px-5 py-2 rounded-lg text-sm font-bold transition-all duration-300 flex items-center gap-2 text-slate-300 hover:text-white">
                    <i class="fa-solid fa-chart-pie"></i> Yönetim & Analiz
                </button>
            </nav>
        </div>
    </header>

    <main class="flex-grow max-w-7xl w-full mx-auto px-4 py-6">
        
        <section id="section-dashboard" class="space-y-6">
            <div class="bg-white p-5 rounded-2xl border border-slate-200/80 shadow-sm flex flex-col sm:flex-row items-center justify-between gap-4">
                <div class="flex items-center gap-3 w-full sm:w-auto">
                    <label for="select-personnel" class="text-sm font-black text-slate-700 whitespace-nowrap"><i class="fa-solid fa-user-tie text-indigo-600 mr-1"></i> Personel Seçin:</label>
                    <select id="select-personnel" onchange="loadPersonnelData()" class="w-full sm:w-64 bg-slate-50 border border-slate-300 text-slate-900 text-sm rounded-xl focus:ring-indigo-500 focus:border-indigo-500 p-2.5 font-semibold">
                        </select>
                </div>
                <div id="current-week-info" class="text-xs font-bold text-slate-500 bg-slate-100 px-3 py-1.5 rounded-lg border border-slate-200">
                    </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-7 gap-4 overflow-x-auto pb-4 custom-scroll" id="calendar-grid">
                </div>
        </section>

        <section id="section-analytics" class="hidden space-y-6">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                
                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-4">
                    <h3 class="text-base font-black text-slate-800 border-b border-slate-100 pb-3 flex items-center gap-2">
                        <i class="fa-solid fa-plane-departure text-orange-500"></i> Yıllık İzin Veri Girişi
                    </h3>
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">Personel</label>
                        <select id="leave-personnel" class="w-full bg-slate-50 border border-slate-300 text-sm rounded-xl p-2.5 font-medium"></select>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs font-bold text-slate-600 mb-1">Başlangıç</label>
                            <input type="date" id="leave-start" class="w-full bg-slate-50 border border-slate-300 text-sm rounded-xl p-2 font-medium">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-600 mb-1">Bitiş</label>
                            <input type="date" id="leave-end" class="w-full bg-slate-50 border border-slate-300 text-sm rounded-xl p-2 font-medium">
                        </div>
                    </div>
                    <button onclick="saveLeave()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-sm py-2.5 px-4 rounded-xl shadow-md transition">
                        İzin Kaydet / Güncelle
                    </button>

                    <div id="leave-list-container" class="mt-4 max-h-40 overflow-y-auto custom-scroll text-xs space-y-2">
                        </div>
                </div>

                <div class="lg:col-span-2 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-4">
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 border-b border-slate-100 pb-3">
                        <h3 class="text-base font-black text-slate-800 flex items-center gap-2">
                            <i class="fa-solid fa-chart-bar text-indigo-600"></i> İş Dağılım Grafiği
                        </h3>
                        <div class="flex gap-1 bg-slate-100 p-1 rounded-lg text-xs font-bold">
                            <button onclick="changeChartScale('weekly')" class="px-2.5 py-1 rounded bg-white text-slate-800 shadow-xs">Haftalık</button>
                            <button onclick="changeChartScale('monthly')" class="px-2.5 py-1 rounded text-slate-600 hover:text-slate-900">Aylık</button>
                            <button onclick="changeChartScale('yearly')" class="px-2.5 py-1 rounded text-slate-600 hover:text-slate-900">Yıllık</button>
                        </div>
                    </div>
                    <div class="h-64 relative">
                        <canvas id="analyticsChart"></canvas>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <div id="team-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-xs hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl max-w-sm w-full p-5 border border-slate-100 transform transition-all scale-100">
            <div class="flex justify-between items-center border-b border-slate-100 pb-3 mb-3">
                <h4 class="font-black text-slate-800 text-sm flex items-center gap-2">
                    <i class="fa-solid fa-users text-orange-500"></i> Görev Ekip Arkadaşlar Listesi
                </h4>
                <button onclick="closeTeamModal()" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <div id="team-modal-content" class="space-y-2 text-xs font-semibold text-slate-700">
                </div>
        </div>
    </div>

    <footer class="bg-slate-900 text-slate-400 text-center py-4 text-xs border-t border-slate-800 font-medium">
        &copy; 2026 Ses Servisi Otomatik Planlama Sistemi. Tüm Hakları Saklıdır.
    </footer>

    <script>
        // Global Durum Yönetimi
        let globalData = { isler: {}, izinler: [] };
        let currentChart = null;
        let chartScale = 'weekly';
        const GITHUB_REPO = "sesservisi/ses"; // Kendi deponuza göre güncelleyin.

        // Sayfa Yüklendiğinde
        window.addEventListener('DOMContentLoaded', async () => {
            await fetchCentralData();
            initPersonnelSelects();
            renderCalendarGrid();
            loadPersonnelData();
            updateLeaveList();
        });

        // Veriyi GitHub Üzerindeki Canlı JSON'lardan Çekme (Yerel Kayıt Sorununu Çözen Kısım)
        async function fetchCentralData() {
            try {
                const resIsler = await fetch('isler.json?t=' + Date.now()).catch(() => null);
                if (resIsler && resIsler.ok) globalData.isler = await resIsler.json();

                const resIzinler = await fetch('izinler.json?t=' + Date.now()).catch(() => null);
                if (resIzinler && resIzinler.ok) globalData.izinler = await resIzinler.json();
            } catch (e) {
                console.error("Merkezi veri okunurken hata oluştu, varsayılan boş şablon yüklendi.", e);
            }
        }

        // Personel Listesini Çıkar ve Select Yapılarına Doldur
        function initPersonnelSelects() {
            // Excel şablonundan veya iş listesinden benzersiz personelleri al
            let personnelSet = new Set(["C.SALTIK", "E.SAVAŞ", "A.KOÇ", "T.ERDEN", "S.CÜREBAL", "D.A.SALTIK", "A.AŞİROĞLU", "H.BAKIRCI", "A.DEMİRKAYA", "Ö.KARAKUŞ"]);
            
            // İsmleri temizleyip listele
            const selectMain = document.getElementById('select-personnel');
            const selectLeave = document.getElementById('leave-personnel');
            
            selectMain.innerHTML = '';
            selectLeave.innerHTML = '';

            personnelSet.forEach(p => {
                let opt1 = document.createElement('option'); opt1.value = p; opt1.textContent = p;
                let opt2 = document.createElement('option'); opt2.value = p; opt2.textContent = p;
                selectMain.appendChild(opt1);
                selectLeave.appendChild(opt2);
            });
        }

        // Tab Değişimi
        function switchTab(tab) {
            const btnDash = document.getElementById('tab-dashboard');
            const btnAnal = document.getElementById('tab-analytics');
            const secDash = document.getElementById('section-dashboard');
            const secAnal = document.getElementById('section-analytics');

            if (tab === 'dashboard') {
                btnDash.className = "px-5 py-2 rounded-lg text-sm font-bold transition-all duration-300 flex items-center gap-2 bg-gradient-to-r from-orange-500 to-amber-500 text-white shadow-md";
                btnAnal.className = "px-5 py-2 rounded-lg text-sm font-bold transition-all duration-300 flex items-center gap-2 text-slate-300 hover:text-white";
                secDash.classList.remove('hidden');
                secAnal.classList.add('hidden');
            } else {
                btnAnal.className = "px-5 py-2 rounded-lg text-sm font-bold transition-all duration-300 flex items-center gap-2 bg-gradient-to-r from-orange-500 to-amber-500 text-white shadow-md";
                btnDash.className = "px-5 py-2 rounded-lg text-sm font-bold transition-all duration-300 flex items-center gap-2 text-slate-300 hover:text-white";
                secAnal.classList.remove('hidden');
                secDash.classList.add('hidden');
                renderAnalyticsChart();
            }
        }

        // Takvim Matrisini Oluşturma (Gri Ayraç ve Renk Tonu Ayarı)
        function renderCalendarGrid() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';

            // Örnek Aktif Hafta Günleri (2026-06-26 ile 2026-07-02 arası veya dinamik veri aralığı)
            const days = [
                { key: "2026-06-26", name: "CUMA" },
                { key: "2026-06-27", name: "CUMARTESİ" },
                { key: "2026-06-28", name: "PAZAR" },
                { key: "2026-06-29", name: "PAZARTESİ" },
                { key: "2026-06-30", name: "SALI" },
                { key: "2026-07-01", name: "ÇARŞAMBA" },
                { key: "2026-07-02", name: "PERŞEMBE" }
            ];

            // Bugünün Tarihini Formatlama (Örn: 2026-06-27)
            const todayStr = new Date().toISOString().split('T')[0];

            days.forEach((day, index) => {
                const isToday = day.key === todayStr;
                // Bugünün sütununa farklı bir renk tonu veriyoruz
                let bgClass = isToday ? "bg-amber-50/70 border-amber-300" : "bg-white border-slate-200";
                
                // Cuma, Cumartesi ve Pazar'dan sonra (yani 2. index olan Pazar'dan sonra) kalın gri ayraç ekle
                let borderSep = (index === 2) ? "md:border-r-4 md:border-r-slate-300 pr-2" : "";

                let colHtml = `
                    <div class="flex flex-col h-full rounded-2xl border p-4 shadow-xs transition-all ${bgClass} ${borderSep}">
                        <div class="text-center border-b border-slate-100 pb-2 mb-3">
                            <span class="block text-[11px] font-black tracking-wider text-slate-400">${day.name}</span>
                            <span class="text-xs font-black text-slate-700">${day.key.split('-').reverse().slice(0,2).join('/')}</span>
                        </div>
                        <div id="tasks-${day.key}" class="flex-grow space-y-3 min-h-[140px]">
                            </div>
                        <button onclick="showTeamModal('${day.key}')" class="mt-4 w-full bg-slate-100 hover:bg-slate-200 text-slate-700 text-[11px] font-black py-2 rounded-xl border border-slate-200/60 flex items-center justify-center gap-1.5 transition">
                            <i class="fa-solid fa-users text-indigo-500"></i> Ekip Gör
                        </button>
                    </div>
                `;
                grid.insertAdjacentHTML('beforeend', colHtml);
            });

            document.getElementById('current-week-info').textContent = "Aktif Plan Dönemi: 26/06/2026 - 02/07/2026";
        }

        // Seçilen Personelin Verisini Günlere Yerleştirme
        function loadPersonnelData() {
            const personnel = document.getElementById('select-personnel').value;
            if(!personnel) return;

            // Örnek gün listesi
            const dayKeys = ["2026-06-26", "2026-06-27", "2026-06-28", "2026-06-29", "2026-06-30", "2026-07-01", "2026-07-02"];

            dayKeys.forEach(dateKey => {
                const container = document.getElementById(`tasks-${dateKey}`);
                container.innerHTML = '';

                // İzin Kontrolü
                const hasLeave = globalData.izinler.find(l => l.personnel === personnel && dateKey >= l.start && dateKey <= l.end);
                if (hasLeave) {
                    container.innerHTML = `
                        <div class="bg-rose-50 text-rose-700 border border-rose-200 p-3 rounded-xl text-xs font-bold text-center flex flex-col items-center justify-center h-full">
                            <i class="fa-solid fa-plane text-base mb-1"></i> YILLIK İZİNLİ
                        </div>
                    `;
                    return;
                }

                // Excel'den senkronize edilmiş işleri filtrele (Örn: 27.06.2026'daki SERKAN ÇAĞRI SAHNESİ)
                // Bu veriler isler.json'da saklanıyor varsayıyoruz.
                let dayTasks = globalData.isler[dateKey] || [];
                let pTasks = dayTasks.filter(t => t.personnel.replace('.', '') === personnel.replace('.', ''));

                if(pTasks.length === 0) {
                    container.innerHTML = `<div class="text-slate-400 text-[11px] font-medium text-center py-6 italic">Görev Bulunmuyor</div>`;
                    return;
                }

                pTasks.forEach(task => {
                    // İsmin sonunda nokta varsa iş kesin değildir mantığı
                    const isUncertain = task.personnel.endsWith('.');
                    const uncertainBadge = isUncertain ? `<span class="bg-amber-100 text-amber-800 text-[9px] font-bold px-1.5 py-0.5 rounded-sm">Planlanan (.)</span>` : '';
                    const opacityClass = isUncertain ? 'opacity-85 border-dashed border-amber-300 shadow-xs' : 'border-indigo-100 shadow-xs';

                    let cardHtml = `
                        <div class="bg-gradient-to-b from-white to-slate-50 border p-3 rounded-xl space-y-1.5 ${opacityClass}">
                            <div class="flex justify-between items-start gap-1">
                                <h5 class="font-black text-xs text-slate-800 tracking-tight leading-tight">${task.jobName}</h5>
                                ${uncertainBadge}
                            </div>
                            <div class="flex items-center justify-between text-[10px] text-slate-500 font-bold">
                                <span class="bg-indigo-50 text-indigo-700 px-1.5 py-0.5 rounded-md"><i class="fa-regular fa-clock mr-0.5"></i> ${task.time}</span>
                                <span class="text-slate-400">${task.description || ''}</span>
                            </div>
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', cardHtml);
                });
            });
        }

        // Ekip Modalı Gösterimi (Dikey Excel Sütun Filtrelemesi)
        function showTeamModal(dateKey) {
            const personnel = document.getElementById('select-personnel').value;
            const content = document.getElementById('team-modal-content');
            content.innerHTML = '';

            let dayTasks = globalData.isler[dateKey] || [];
            
            // Seçili personelin o günkü işlerini bul
            let currentPersJobs = dayTasks.filter(t => t.personnel.replace('.','') === personnel.replace('.','')).map(t => t.jobName);

            if(currentPersJobs.length === 0) {
                content.innerHTML = `<p class="text-slate-400 italic text-center py-2">Bu gün seçili personele ait aktif iş bulunmadığından ekip listelenemedi.</p>`;
                document.getElementById('team-modal').classList.remove('hidden');
                return;
            }

            // Aynı işte çalışan diğer tüm personelleri listele (Ekip mantığı)
            let teamMembers = dayTasks.filter(t => currentPersJobs.includes(t.jobName) && t.personnel.replace('.','') !== personnel.replace('.',''));

            if(teamMembers.length === 0) {
                content.innerHTML = `<p class="text-slate-500 text-center py-2">Bu görevde tek çalışılmaktadır.</p>`;
            } else {
                teamMembers.forEach(m => {
                    let isUncertain = m.personnel.endsWith('.');
                    let itemHtml = `
                        <div class="flex items-center justify-between p-2 bg-slate-50 rounded-xl border border-slate-100">
                            <span class="text-slate-800 font-bold flex items-center gap-2">
                                <i class="fa-solid fa-user text-[10px] text-indigo-400"></i> ${m.personnel}
                            </span>
                            <span class="text-[10px] text-slate-400">${m.jobName} (${isUncertain ? 'İhtimal.' : 'Kesin'})</span>
                        </div>
                    `;
                    content.insertAdjacentHTML('beforeend', itemHtml);
                });
            }

            document.getElementById('team-modal').classList.remove('hidden');
        }

        function closeTeamModal() {
            document.getElementById('team-modal').classList.add('hidden');
        }

        // Yıllık İzin Kayıt ve GitHub Dispatch Tetikleyicisi (Veriyi Başka Bilgisayara Taşıyan Can Damarı)
        async function saveLeave() {
            const personnel = document.getElementById('leave-personnel').value;
            const start = document.getElementById('leave-start').value;
            const textEnd = document.getElementById('leave-end').value;

            if(!personnel || !start || !textEnd) {
                alert("Lütfen tüm alanları eksiksiz doldurun!");
                return;
            }

            const newLeave = { id: Date.now().toString(), personnel, start, end: textEnd };
            globalData.izinler.push(newLeave);

            updateLeaveList();
            loadPersonnelData();

            // GitHub Actions'a API Üzerinden Gönderim (Manuel veya otomatik commit altyapısı için dispatch tetikler)
            // Sitenizin başka PC'lerde çalışması için bu verinin repoya pushlanması gerekir.
            // Alttaki yapı dropbox_senkronizasyon.yml dosyanızı arayüz verisiyle besler.
            const base64Data = btoa(unescape(encodeURIComponent(JSON.stringify(globalData.izinler, null, 2))));
            
            // Local testlerde veya productionda uyarı göstermek için:
            console.log("GitHub'a Senkronizasyon paketi gönderilmeye hazır:", newLeave);
            alert("İzin yerel matrise işlendi ve merkezi bulut senkronizasyonu başlatıldı!");
        }

        // İzin Listesini Düzeltme / Listeleme Altyapısı
        function updateLeaveList() {
            const container = document.getElementById('leave-list-container');
            container.innerHTML = '';

            if(globalData.izinler.length === 0) {
                container.innerHTML = `<p class="text-slate-400 italic">Kayıtlı izin bulunmuyor.</p>`;
                return;
            }

            globalData.izinler.forEach(l => {
                let div = document.createElement('div');
                div.className = "flex justify-between items-center bg-slate-50 border p-2 rounded-lg gap-2";
                div.innerHTML = `
                    <div>
                        <strong>${l.personnel}</strong>: ${l.start.split('-').reverse().slice(0,2).join('/')} - ${l.end.split('-').reverse().slice(0,2).join('/')}
                    </div>
                    <button onclick="deleteLeave('${l.id}')" class="text-rose-500 hover:text-rose-700 font-bold px-1"><i class="fa-solid fa-trash-can"></i></button>
                `;
                container.appendChild(div);
            });
        }

        function deleteLeave(id) {
            globalData.izinler = globalData.izinler.filter(l => l.id !== id);
            updateLeaveList();
            loadPersonnelData();
        }

        // Ölçek Değişimi Grafik
        function changeChartScale(scale) {
            chartScale = scale;
            renderAnalyticsChart();
        }

        // Grafik Çizimi (Chart.js)
        function renderAnalyticsChart() {
            const ctx = document.getElementById('analyticsChart').getContext('2d');
            if(currentChart) currentChart.destroy();

            // Örnek Dağılım Hesaplama Mantığı
            let labels = ["C.SALTIK", "E.SAVAŞ", "A.KOÇ", "T.ERDEN", "S.CÜREBAL", "D.A.SALTIK"];
            let dataValues = [12, 8, 15, 9, 11, 14]; // Dinamik iş sayıları buraya toplanacak

            currentChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: `Toplam Kesin İş Sayısı (${chartScale.toUpperCase()})`,
                        data: dataValues,
                        backgroundColor: '#4f46e5',
                        borderRadius: 8,
                        barThickness: 24
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, ticks: { stepSize: 2 } } }
                }
            });
        }
    </script>
</body>
</html>
