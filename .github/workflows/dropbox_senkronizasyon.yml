name: Otomatik Görev Listesi Senkronizasyonu

on:
  schedule:
    # TSİ 08:00, 10:00, 12:00, 14:00, 16:00, 18:00 ve 20:00 saatlerinde tetiklenir.
    # Virgüllerin arasında kesinlikle boşluk olmamalıdır: '0 5,7,9,11,13,15,17 * * *'
    - cron: '0 5,7,9,11,13,15,17 * * *'
  workflow_dispatch: # Manuel çalıştırma butonu

permissions:
  contents: write

jobs:
  sync-file:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu Bilgisayara İndir
        uses: actions/checkout@v4

      - name: Dropbox Güncel Dosyayı Gizlice İndir
        run: |
          curl -L -o Gorev-Listesi.xlsx "https://www.dropbox.com/scl/fi/qryt9lhx1l7igmi6qg3ak/Gorev-Listesi.xlsx?rlkey=w97mop9zlow5xt0d0cwxg8wp2&e=3&st=w7ogxxi0&dl=1"

      - name: Değişiklik Kontrolü ve Web Sitesine Otomatik Yükleme
        run: |
          git config --global user.name "GitHub Otomatik Senkronizasyon"
          git config --global user.email "action@github.com"
          
          git add Gorev-Listesi.xlsx
          
          if git diff --staged --quiet; then
            echo "Şef herhangi bir değişiklik yapmamış. İşlem atlandı."
          else
            git commit -m "Sistem Raporu: Excel listesi otomatik senkronize edildi"
            git push
          fi
