name: Otomatik Görev Listesi Senkronizasyonu

on:
  schedule:
    # TSİ 08:00, 10:00, 12:00, 14:00, 16:00, 18:00 ve 20:00 saatlerinde tetiklenir.
    # GitHub UTC saat dilimini kullandığı için Türkiye saatinin 3 saat öncesi yazılmıştır.
    - cron: '0 5,7,9,11,13,15,17 * * *'
  workflow_dispatch: # İhtiyaç halinde GitHub paneli üzerinden manuel tetikleme butonu sağlar.

permissions:
  contents: write

jobs:
  sync-file:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu Bilgisayara İndir
        uses: actions/checkout@v4

      - name: Dropbox Güncel Dosyayı Gizlice İndir
        run: |
          # Şefinizin paylaştığı güncel Excel dosyası doğrudan bu bağlantıdan indirilir.
          curl -L -o Gorev-Listesi.xlsx "https://www.dropbox.com/scl/fi/qryt9lhx1l7igmi6qg3ak/Gorev-Listesixlxx?rlkey=w97mop9zlow5xt0d0cwxg8wp2&e=3&st=w7ogxxi0&dl=1"

      - name: Değişiklik Kontrolü ve Web Sitesine Otomatik Yükleme
        run: |
          git config --global user.name "GitHub Otomatik Senkronizasyon"
          git config --global user.email "action@github.com"
          
          # Yeni inen dosyayı depoya ekle
          git add Gorev-Listesi.xlsx
          
          # Eğer dosya şef tarafından değiştirilmişse sunucuya yükle, değişiklik yoksa es geç
          if git diff --staged --quiet; then
            echo "Şef herhangi bir değişiklik yapmamış. İşlem atlandı."
          else
            git commit -m "Sistem Raporu: Excel listesi şefin güncel dosyası ile otomatik senkronize edildi (TSİ)"
            git push
          fi
